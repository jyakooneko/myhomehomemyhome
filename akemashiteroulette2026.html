<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>
      あけましてルーレット2026 - 道具箱｜myhomehomemyhome
    </title>
    
    <link href="https://midomo.neocities.org/style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: "Zen Kaku Gothic New", sans-serif;
        text-align: center;
        margin-top: 100px;
        overflow-x: hidden;
        transition: background 1.5s;
      }
      
      h1 {
        margin-bottom: 40px;
      }
      
      .text {
        font-size: 64px;
        font-weight: bold;
      }
      
      .roulette {
        display: inline-block;
        width: 2.5em;
        color: green;
        transition: color 1s, opacity 1s;
      }
      
      button {
        margin-top: 40px;
        font-size: 24px;
        padding: 10px 30px;
        cursor: pointer;
      }
      
      /* 紙吹雪 */
      .confetti {
        position: fixed;
        top: -10px;
        width: 10px;
        height: 10px;
        animation: fall linear forwards;
      }
      
      @keyframes fall {
        to {
          transform: translate(
            calc(-50px + 100px * var(--x)),
            110vh
          ) rotate(720deg);
          opacity: 0;
        }
      }

      .celebrate {
        background: #fff;
        }
      
      .celebrate,
      .celebrate .text,
      .celebrate .roulette,
      .celebrate .contents,
      .celebrate a {
        color: #c00; 
      }

      .silence {
        background: #f5f5f5;
      }
      
      .silence .roulette {
        color: rgba(0, 0, 0, 0.15); 
        opacity: 1;
      }
      
      .silence .text {
        color: rgba(0, 0, 0, 0.25);
      }
      .silence .contents {
        color: rgba(0, 0, 0, 0.25);
      }
      
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      
      .modal-box {
        background: white;
        padding: 30px 40px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }
      
        .modal-boxtxt {
        color: black;
        padding: 30px 40px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }
      
      .modal-buttons {
        margin-top: 20px;
        display: flex;
        gap: 20px;
        justify-content: center;
      }
      
      .modal-buttons button {
        font-size: 18px;
        padding: 8px 20px;
      }
      
      .credit {
        margin-top: 40px;
        font-size: 14px;
        letter-spacing: 0.05em;
        opacity: 0;
        transition: opacity 2s;
        color: rgba(0, 0, 0, 0.4);
      }
      .celebrate .credit {
        opacity: 1;
      }
      
      #mochi-link {
        position: fixed;
        bottom: 20px;
        right: 24px;
        font-size: 14px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.5s;
        color: rgba(0,0,0,0.4);
        text-decoration: none;
      }
      
      .silence #mochi-link {
        opacity: 1;
        pointer-events: auto;
      }


    </style>
  </head>
  
  <body class="zen-kaku-gothic-new-light">
    <div id="sound-modal" class="modal">
      <div class="modal-box">
        <div class="modal-boxtxt">
          <p>音を鳴らしてもいい？</p>
            <div class="modal-buttons">
              <button id="sound-yes">OK</button>
              <button id="sound-no">音なし</button>
              </div>
          </div>
      </div>
    </div>

    <div class=contents>
      <h4>あけましてルーレット2026</h4>
    </div>
    
    <div class="text">
        あけましておめでとうございま
        <span class="roulette" id="roulette">？？</span>
    </div>
    
    <div>
      <button id="btn">まわす</button>
    </div>
    
    <audio id="haru" src="https://jyakooneko.github.io/audio/haru.mp3" preload="auto"></audio>
    
    
    
    <script>
    let soundAllowed = false;

    const modal = document.getElementById("sound-modal");
    const yesBtn = document.getElementById("sound-yes");
    const noBtn = document.getElementById("sound-no");

    yesBtn.addEventListener("click", () => {
      soundAllowed = true;
      haru.volume = 0;
      haru.play().then(() => {
        haru.pause();
        haru.currentTime = 0;
        haru.volume = 1;
      });
    
      modal.style.display = "none";
    });
    
    noBtn.addEventListener("click", () => {
      soundAllowed = false;
      modal.style.display = "none";
    });

    
    let shouldPlayHaru = false;

    const words = ["す", "せん"];
      const roulette = document.getElementById("roulette");
      const btn = document.getElementById("btn");
      
      let index = 0;
      let speed = 80;
      let running = true;
      let timeoutId = null;
      
      function spin() {
        roulette.textContent = words[index];
        index = (index + 1) % words.length;
      
        speed *= 1.08;
      
        if (speed > 650) {
          running = false;
          finish();
          return;
        }
      
        timeoutId = setTimeout(spin, speed);
      }
      
      function finish() {
        const result = Math.random() < 0.5 ? "す" : "せん";
        roulette.textContent = result;
        btn.textContent = "もう一度";
      
        if (result === "す") {
          celebrateEffect();
        } else {
          silenceEffect();
        }
      }
  
      
        function celebrateEffect() {
          document.body.classList.add("celebrate");
          if (soundAllowed) {
            haru.volume = 0.5;
            haru.currentTime = 0;
            haru.play();
          }
          launchConfetti(200);
        }


      function silenceEffect() {
        document.body.classList.add("silence");
      }
      
      function launchConfetti(amount = 80) {
        for (let i = 0; i < amount; i++) {
          const confetti = document.createElement("div");
          confetti.className = "confetti";
          confetti.style.left = Math.random() * 100 + "vw";
          confetti.style.background =
            `hsl(${350 + Math.random() * 20}, 80%, 55%)`;
          confetti.style.animationDuration =
            2 + Math.random() * 2 + "s";
          confetti.style.setProperty("--x", Math.random());

      
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 4000);
        }
      }

      
          function reset() {
            clearTimeout(timeoutId);
            index = 0;
            speed = 80;
            running = true;
            btn.textContent = "まわす";
          
            document.body.classList.remove("silence", "celebrate");
          
            haru.pause();
            haru.currentTime = 0;
            
            document.body.classList.remove("silence", "celebrate");
          
            spin();
          }

      
          btn.addEventListener("click", () => {
            if (running) {
              clearTimeout(timeoutId);
              speed = 80;
              spin();
            } else {
              if (shouldPlayHaru) {
                haru.currentTime = 0;
                haru.play();        // ← ユーザー操作として再生
                shouldPlayHaru = false;
              }
              reset();
            }
          });

      
      /* 自動スタート */
    </script>
    
    <div id="credit" class="credit">
      宮城道雄「春の海」
    </div>
    <a id="mochi-link" href="https://midomo.neocities.org/dougubako/mochiclicker">餅？</a>

  </body>
</html>
