<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>うおタイピング</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Zen Kaku Gothic New','Hiragino Sans','Meiryo',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:20px;
  width:400px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  text-align:center;
}

h1{
  margin-top:0;
  font-weight:700;
}

#kanji{
  font-size:70px;
  margin:20px 0;
  font-weight:bold;
  min-height:90px;
  position: relative;
}


#reading{
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  color: white;
}

input{
  width:100%;
  padding:10px;
  font-size:22px;
  border:none;
  border-radius:10px;
  outline:none;
  text-align:center;
  display:none; 
}

.stats{
  margin-top:20px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
}

button{
  margin-top:25px;
  width:100%;
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}


#hint{
  margin-top:30px;
  font-size:14px;
  color:white;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(8px);
  z-index:100;
}

.modalContent{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.modalContent h2{
  margin-top:0;
}

.modeBtn{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.modeBtn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
} 

.topInfo{
  position:absolute;
  top:15px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.card{
  position:relative;
}
  
</style>
</head>
<body>

<div class="card">
  <h1>うおタイピング</h1>

  <div class="topInfo">
    <div id="progress">0/0</div>
    <div id="hintCount">ヒント: 0</div>
  </div>

<div id="kanji">
  <div id="kanjiText">読めますよ<br>うに</div>
  <div id="reading"></div>
</div>

  <form autocomplete="off">
  <input 
    type="text" 
    id="input"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
  >
</form>
  <div id="hint">エンターキーでヒント(5秒のペナルティが付きます)</div>

  <div class="stats">
    <div>⏰ <span id="time">60</span>s</div>
    <div>🏆 <span id="score">0</span></div>
  </div>

  <button id="startBtn">スタート</button>
</div>

<div id="modeModal" class="modal">
  <div class="modalContent">
    <h2>モードを選択</h2>
    <button class="modeBtn" data-mode="normal">
      ノーマルモード<br><small>60秒で何問いける？</small>
    </button>
    <button class="modeBtn" data-mode="timeattack">
      タイムアタックモード<br><small>全問クリアまで計測</small>
    </button>
  </div>
</div>

<script>
const words = [
  { kanji: "鯏", reading: ["asari"] },
  { kanji: "鯵", reading: ["aji","azi"] },
  { kanji: "鮎", reading: ["ayu"] },
  { kanji: "鯇", reading: ["amenouo"] },
  { kanji: "鮑", reading: ["awabi"] },
  { kanji: "魦", reading: ["isaza"] },
  { kanji: "鯔", reading: ["ina","bora","todo"] },
  { kanji: "鯆", reading: ["iruka","iruca"] },
  { kanji: "鰯", reading: ["iwashi","iwasi"] },
  { kanji: "鮇", reading: ["iwana"] },
  { kanji: "鰮", reading: ["iwasi","iwashi"] },
  { kanji: "鯎", reading: ["ugui"] },
  { kanji: "鱓", reading: ["utubo","utsubo"] },
  { kanji: "鰻", reading: ["unagi"] },
  { kanji: "鱏", reading: ["ei"] },
  { kanji: "鱝", reading: ["ei"] },
  { kanji: "鱛", reading: ["eso"] },
  { kanji: "鰕", reading: ["ebi"] },
  { kanji: "鰧", reading: ["okoze"] },
  { kanji: "鰍", reading: ["kajika","kazika","inada"] },
  { kanji: "鮖", reading: ["ajika","kazika","gori"] },
  { kanji: "鰹", reading: ["katuo","katsuo"] },
  { kanji: "鱟", reading: ["kabutogani"] },
  { kanji: "魳", reading: ["kamasu"] },
  { kanji: "鰈", reading: ["karei"] },
  { kanji: "鮍", reading: ["kawahagi"] },
  { kanji: "鱚", reading: ["kisu"] },
  { kanji: "鯨", reading: ["kujira","kuzira"] },
  { kanji: "鯉", reading: ["koi"] },
  { kanji: "鯒", reading: ["koti","kochi"] },
  { kanji: "鮗", reading: ["konoshiro","konosiro"] },
  { kanji: "鰶", reading: ["konoshiro","konosiro"] },
  { kanji: "鯯", reading: ["konosiro","konoshiro","sappa","saxpa"] },
  { kanji: "鱅", reading: ["konosiro","konoshiro","titikaburi","chichikaburi","chitikaburi","tichikaburi"] },
  { kanji: "鮴", reading: ["gori"] },
  { kanji: "鮭", reading: ["sake","shake","syake"] },
  { kanji: "鮏", reading: ["sake","shake","syake"] },
  { kanji: "鯖", reading: ["saba"] },
  { kanji: "鮫", reading: ["same"] },
  { kanji: "鱵", reading: ["sayori"] },
  { kanji: "鰆", reading: ["sawara"] },
  { kanji: "鯢", reading: ["sansyouuo","sanshouuo","mekujira","mekuzira"] },
  { kanji: "鱪", reading: ["siira","shiira"] },
  { kanji: "鯱", reading: ["syachi","shachi","syati","shati"] },
  { kanji: "鮊", reading: ["shirauo","sirauo","kasube"] },
  { kanji: "鯳", reading: ["suketoudara"] },
  { kanji: "鱸", reading: ["suzuki"] },
  { kanji: "鯐", reading: ["subashiri","subasiri"] },
  { kanji: "鮬", reading: ["seigo"] },
  { kanji: "鯛", reading: ["tai"] },
  { kanji: "鰖", reading: ["takabe"] },
  { kanji: "鰱", reading: ["tanago"] },
  { kanji: "鮹", reading: ["tako"] },
  { kanji: "魛", reading: ["tatiuo","tachiuo"] },
  { kanji: "鱈", reading: ["tara"] },
  { kanji: "鱘", reading: ["tyouzame","chouzame"] },
  { kanji: "鰌", reading: ["dojyou","dozyou"] },
  { kanji: "魹", reading: ["todo"] },
  { kanji: "鯰", reading: ["namazu"] },
  { kanji: "鰊", reading: ["nishin","nisin"] },
  { kanji: "鮸", reading: ["nibe"] },
  { kanji: "鯊", reading: ["haze"] },
  { kanji: "鰣", reading: ["hasu"] },
  { kanji: "鰰", reading: ["hatahata"] },
  { kanji: "魬", reading: ["hamati","hamachi"] },
  { kanji: "鱧", reading: ["hamo"] },
  { kanji: "鮠", reading: ["haya"] },
  { kanji: "鰚", reading: ["haraka"] },
  { kanji: "鰉", reading: ["higai"] },
  { kanji: "鯷", reading: ["hishiko","hisiko"] },
  { kanji: "鮃", reading: ["hirame"] },
  { kanji: "鰭", reading: ["hire"] },
  { kanji: "鱶", reading: ["huka","fuka"] },
  { kanji: "鰒", reading: ["hugu","fugu","awabi"] },
  { kanji: "鮒", reading: ["huna","funa"] },
  { kanji: "鰤", reading: ["buri"] },
  { kanji: "鮱", reading: ["bora","oobora"] },
  { kanji: "鮪", reading: ["maguro"] },
  { kanji: "鱒", reading: ["masu"] },
  { kanji: "鮲", reading: ["mate","koti","kochi"] },
  { kanji: "鯧", reading: ["managatsuo","managatuo"] },
  { kanji: "鯥", reading: ["mutu","mutsu"] },
  { kanji: "鰘", reading: ["muroaji","muroazi"] },
  { kanji: "鮴", reading: ["mebaru"] },
  { kanji: "鰙", reading: ["wakasagi"] },
  { kanji: "鰐", reading: ["wani"] },
];

const kanjiTextEl = document.getElementById("kanjiText");
let mode = "normal"; 
const modal = document.getElementById("modeModal");
let remainingWords = [];
let currentWord;
let score = 0;
let time = 60;
let timer = null;
let playing = false;
let startTime = 0;
let hintUsed = 0;
const totalQuestions = words.length;

const progressEl = document.getElementById("progress");
const hintCountEl = document.getElementById("hintCount");
  
const kanjiEl = document.getElementById("kanji");
const readingEl = document.getElementById("reading");
const inputEl = document.getElementById("input");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const startBtn = document.getElementById("startBtn");

function formatTime(ms){
  const minutes = Math.floor(ms / 60000);
  const seconds = Math.floor((ms % 60000) / 1000);
  const milli = Math.floor((ms % 1000) / 10);

  return (
    String(minutes).padStart(2,"0") + ":" +
    String(seconds).padStart(2,"0") + ":" +
    String(milli).padStart(2,"0")
  );
} 
  
function startGame(){
  if(playing) return;
  
  kanjiTextEl.textContent = "";

  playing = true;
  score = 0;
  hintUsed = 0;
  remainingWords = [...words];
  startTime = Date.now();

  progressEl.textContent = `0/${totalQuestions}`;
  hintCountEl.textContent = `ヒント: 0`;

if(mode === "normal"){
  time = 60;
  timeEl.textContent = time;

  timer = setInterval(()=>{
    time--;
    timeEl.textContent = time;

    if(time <= 0){
      clearInterval(timer);
      endGame(false);
    }
  },1000);

}else{
  timer = setInterval(()=>{
    const elapsed = Date.now() - startTime;
    timeEl.textContent = formatTime(elapsed);
  },10);
}

  scoreEl.textContent = score;

  inputEl.style.display = "block";
  inputEl.disabled = false;
  inputEl.value = "";
  inputEl.focus();

  startBtn.disabled = true;
  readingEl.textContent = "";

  nextWord();
}

function nextWord(){

  if(remainingWords.length === 0){
    if(timer) clearInterval(timer);
    endGame(true);
    return;
  }

  const index = Math.floor(Math.random()*remainingWords.length);
  currentWord = remainingWords[index];
  remainingWords.splice(index,1);

  kanjiTextEl.textContent = currentWord.kanji;
  readingEl.textContent = "";

  const currentNumber = totalQuestions - remainingWords.length;
  progressEl.textContent = `${currentNumber}/${totalQuestions}`;
}

inputEl.addEventListener("keydown",(e)=>{
  if(!playing) return;

if(e.key === "Enter"){
  readingEl.textContent = currentWord.reading[0];
  hintUsed++;
  hintCountEl.textContent = `ヒント: ${hintUsed}`;

  if(mode === "normal"){
    time -= 5;
    if(time < 0) time = 0;
    timeEl.textContent = time;

    if(time <= 0){
      clearInterval(timer);
      endGame(false);
    }
  }else{
    startTime -= 5000;
  }

  return;
}

  const possibleReadings = currentWord.reading;
  const currentInput = inputEl.value + e.key;
  const match = possibleReadings.find(r => r.startsWith(currentInput));

  if(match){
    inputEl.value = currentInput;
    if(possibleReadings.includes(currentInput)){
      score++;
      progressEl.textContent = `${score}/${totalQuestions}`;
      scoreEl.textContent = score;
      inputEl.value = "";
      nextWord();
    }
  }

  e.preventDefault();
});

function endGame(allClear){

  playing = false;
  inputEl.style.display = "none";
  startBtn.disabled = false;
  if(timer) clearInterval(timer);

  if(mode === "timeattack"){
    const finalTime = Date.now() - startTime;
    kanjiTextEl.innerHTML = `
      ${formatTime(finalTime)}<br>
      ヒント${hintUsed}回
    `;
  }else{
    kanjiTextEl.textContent = `${score}/${totalQuestions}問！`;
  }

  readingEl.textContent = "";
}

startBtn.addEventListener("click", ()=>{
  modal.style.display = "flex";
});
  
document.querySelectorAll(".modeBtn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    mode = btn.dataset.mode;
    modal.style.display = "none";
    startGame();
  });
});
  
</script>

</body>
</html>
