<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>うおタイピング</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Zen Kaku Gothic New','Hiragino Sans','Meiryo',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:20px;
  width:400px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  text-align:center;
}

h1{
  margin-top:0;
  font-weight:700;
}

#kanji{
  font-size:70px;
  margin:20px 0;
  font-weight:bold;
  min-height:90px;
  position: relative;
}


#reading{
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  color: white;
}

input{
  width:100%;
  padding:10px;
  font-size:22px;
  border:none;
  border-radius:10px;
  outline:none;
  text-align:center;
  display:none; 
  background-color: transparent;
  color: white;  
}

.stats{
  margin-top:20px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
}

button{
  margin-top:25px;
  width:100%;
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}


#hint{
  margin-top:30px;
  font-size:14px;
  color:white;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  backdrop-filter:blur(8px);
  z-index:100;
}

.modalContent{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.modalContent h2{
  margin-top:0;
}

.modeBtn{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.modeBtn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
} 

.topInfo{
  position:absolute;
  top:15px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.card{
  position:relative;
}
  
</style>
</head>
<body>

<div class="card">
  <h1>うおタイピング</h1>

  <div class="topInfo">
    <div id="progress">0/0</div>
    <div id="hintCount">ヒント: 0</div>
  </div>

<div id="kanji">
  <div id="kanjiText">読めますよ<br>うに</div>
  <div id="reading"></div>
</div>

  <form autocomplete="off">
  <input 
    type="text" 
    id="input"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    inputmode="latin"
    lang="en"
    style="ime-mode: disabled;"
    >
</form>
  <div id="hint">エンターキーでヒント(5秒のペナルティが付きます)</div>

  <div class="stats">
    <div>⏰ <span id="time">60</span>s</div>
    <div>🏆 <span id="score">0</span></div>
  </div>

  <button id="startBtn">スタート</button>
</div>

<div id="modeModal" class="modal">
  <div class="modalContent">
    <h2>モードを選択</h2>
    <button class="modeBtn" data-mode="normal">
      ノーマルモード<br><small>60秒で何問いける？</small>
    </button>
    <button class="modeBtn" data-mode="timeattack">
      タイムアタックモード<br><small>全問クリアまで計測</small>
    </button>
  </div>
</div>
