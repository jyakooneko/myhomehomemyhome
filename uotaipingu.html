<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>うおタイピング</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Zen Kaku Gothic New','Hiragino Sans','Meiryo',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:20px;
  width:400px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  text-align:center;
}

h1{
  margin-top:0;
  font-weight:700;
}

#kanji{
  font-size:70px;
  margin:20px 0;
  font-weight:bold;
  min-height:90px;
  position: relative;
}


#reading{
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  color: #ffeb3b;
}

input{
  width:100%;
  padding:10px;
  font-size:22px;
  border:none;
  border-radius:10px;
  outline:none;
  text-align:center;
  display:none; 
}

.stats{
  margin-top:20px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
}

button{
  margin-top:25px;
  width:100%;
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}


#hint{
  margin-top:10px;
  font-size:14px;
  color:#ffeb3b;
}
</style>
</head>
<body>

<div class="card">
  <h1>🐟 うおタイピング</h1>

  <div id="kanji">スタートを押してね！
    <div id="reading"></div>
  </div>

  <input type="text" id="input">
  <div id="hint">エンターキーでヒント</div>

  <div class="stats">
    <div>⏰ <span id="time">60</span>s</div>
    <div>🏆 <span id="score">0</span></div>
  </div>

  <button id="startBtn">スタート</button>
</div>

<script>
const words = [
  { kanji: "鯏", reading: ["asari"] },
  { kanji: "鯵", reading: ["aji","azi"] },
  { kanji: "鮎", reading: ["ayu"] },
  { kanji: "鮑", reading: ["awabi"] },
  { kanji: "魦", reading: ["isaza"] },
  { kanji: "鯔", reading: ["ina"] },
  { kanji: "鯆", reading: ["iruka","iruca"] },
  { kanji: "鰯", reading: ["iwashi","iwasi"] },
  { kanji: "鯏", reading: ["ugui"] },
  { kanji: "鱓", reading: ["utubo","utsubo"] },
  { kanji: "鰻", reading: ["unagi"] },
  { kanji: "鰕", reading: ["ebi"] },
  { kanji: "鰍", reading: ["kajika","kazika"] },
  { kanji: "鰹", reading: ["katuo","katsuo"] },
  { kanji: "鰈", reading: ["karei"] },
  { kanji: "鮍", reading: ["kawahagi"] },
  { kanji: "鱚", reading: ["kisu"] },
  { kanji: "鯨", reading: ["kujira","kuzira"] },
  { kanji: "鯉", reading: ["koi"] },
  { kanji: "鯒", reading: ["koti","kochi"] },
  { kanji: "鮗", reading: ["konoshiro","konosiro"] },
  { kanji: "鮴", reading: ["gori"] },
  { kanji: "鮭", reading: ["sake","shake","syake"] },
  { kanji: "鯯", reading: ["sappa","saxpa"] },
  { kanji: "鯖", reading: ["saba"] },
  { kanji: "鮫", reading: ["same"] },
];

let remainingWords = [];
let currentWord;
let score = 0;
let time = 60;
let timer = null;
let playing = false;
let startTime = 0;

const kanjiEl = document.getElementById("kanji");
const readingEl = document.getElementById("reading");
const inputEl = document.getElementById("input");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const startBtn = document.getElementById("startBtn");

function startGame(){
  if(playing) return;

  playing = true;
  score = 0;
  time = 60;
  startTime = Date.now();
  remainingWords = [...words];

  scoreEl.textContent = score;
  timeEl.textContent = time;

  inputEl.style.display = "block";
  inputEl.disabled = false;
  inputEl.value = "";
  inputEl.focus();

  startBtn.disabled = true;

  readingEl.textContent = "";

  nextWord();

  timer = setInterval(()=>{
    time--;
    timeEl.textContent = time;
    if(time <= 0){
      clearInterval(timer);
      endGame(false);
    }
  },1000);
}

function nextWord(){
  if(remainingWords.length === 0){
    clearInterval(timer);
    endGame(true);
    return;
  }

  const index = Math.floor(Math.random()*remainingWords.length);
  currentWord = remainingWords[index];
  remainingWords.splice(index,1);

  kanjiEl.firstChild.textContent = currentWord.kanji;
  readingEl.textContent = "";
}

// エンターキーで読みがな表示
inputEl.addEventListener("keydown",(e)=>{
  if(!playing) return;

  if(e.key === "Enter"){
    readingEl.textContent = currentWord.reading.join(", ");
    return;
  }

  const key = e.key.toLowerCase();
  if(!/^[a-z]$/.test(key)){
    e.preventDefault();
    return;
  }

  const possibleReadings = currentWord.reading;
  const currentInput = inputEl.value + key;
  const match = possibleReadings.find(r => r.startsWith(currentInput));

  if(match){
    inputEl.value = currentInput;
    if(possibleReadings.includes(currentInput)){
      score++;
      scoreEl.textContent = score;
      inputEl.value = "";
      nextWord();
    }
  }

  e.preventDefault();
});

function endGame(allClear){
  playing = false;
  inputEl.style.display = "none";
  startBtn.disabled = false;

  if(allClear){
    const clearTime = Math.floor((Date.now() - startTime) / 1000);
    kanjiEl.firstChild.textContent = clearTime + "秒で答えられました！";
    readingEl.textContent = "";
  }else{
    kanjiEl.firstChild.textContent = score + "/" + words.length + "問正解！";
    readingEl.textContent = "";
  }
}

startBtn.addEventListener("click", startGame);
</script>

</body>
</html>
