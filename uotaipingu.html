<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>うおタイピング</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Zen Kaku Gothic New','Hiragino Sans','Meiryo',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:20px;
  width:400px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  text-align:center;
}

h1{
  margin-top:0;
  font-weight:700;
}

#kanji{
  font-size:70px;
  margin:20px 0;
  font-weight:bold;
  min-height:90px;
}

input{
  width:100%;
  padding:10px;
  font-size:22px;
  border:none;
  border-radius:10px;
  outline:none;
  text-align:center;
  display:none; /* ← 最初は非表示 */
}

.stats{
  margin-top:20px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
}

button{
  margin-top:25px;
  width:100%;
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}
</style>
</head>
<body>

<div class="card">
  <h1>🐟 うおタイピング</h1>

  <div id="kanji">スタートを押してね！</div>

  <input type="text" id="input">

  <div class="stats">
    <div>⏰ <span id="time">60</span>s</div>
    <div>🏆 <span id="score">0</span></div>
  </div>

  <button id="startBtn">スタート</button>
</div>

<script>
const words = [
  { kanji: "鯖", reading: "saba" },
  { kanji: "鮭", reading: "sake" },
  { kanji: "鰤", reading: "buri" },
  { kanji: "鯛", reading: "tai" },
  { kanji: "鰻", reading: "unagi" },
  { kanji: "鮪", reading: "maguro" }
];

let currentWord;
let score = 0;
let time = 60;
let timer = null;
let playing = false;

const kanjiEl = document.getElementById("kanji");
const inputEl = document.getElementById("input");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const startBtn = document.getElementById("startBtn");

function startGame(){
  if(playing) return;

  playing = true;
  score = 0;
  time = 60;

  scoreEl.textContent = score;
  timeEl.textContent = time;

  inputEl.style.display = "block"; // ← 表示
  inputEl.disabled = false;
  inputEl.value = "";
  inputEl.focus();

  startBtn.disabled = true;
  nextWord();

  timer = setInterval(()=>{
    time--;
    timeEl.textContent = time;

    if(time <= 0){
      clearInterval(timer);
      endGame();
    }
  },1000);
}

function nextWord(){
  currentWord = words[Math.floor(Math.random()*words.length)];
  kanjiEl.textContent = currentWord.kanji;
}

inputEl.addEventListener("keydown",(e)=>{
  if(!playing) return;

  const key = e.key.toLowerCase();

  // a〜z以外は無効（Backspaceは許可）
  if(!/^[a-z]$/.test(key)){
    e.preventDefault();
    return;
  }
  const expected = currentWord.reading[inputEl.value.length];

  if(key === expected){
    // 1文字追加
    inputEl.value += key;

    if(inputEl.value === currentWord.reading){
      score++;
      scoreEl.textContent = score;
      inputEl.value = "";
      nextWord();
    }
  }

  e.preventDefault();
});

function endGame(){
  playing = false;
  kanjiEl.textContent = "終了！スコア: " + score;
  inputEl.style.display = "none"; // ← 非表示に戻す
  startBtn.disabled = false;
}

startBtn.addEventListener("click", startGame);
</script>

</body>
</html>
